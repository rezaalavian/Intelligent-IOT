name: Intelligent-IOT
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.14
  - pip=24.2
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.11.3
  - scikit-learn=1.3.2
  - networkx=3.3
  - pyyaml=6.0.1
  - pyarrow=16.1.0
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1
  - pip:
    - -r requirements.txt
    # Flink is intentionally not pip-installed here because it is provided as an external runtime.

